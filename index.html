<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0c11">
<meta name="apple-mobile-web-app-title" content="Noodle">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="manifest" href="manifest.webmanifest">
<title>Noodle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0d0c11; --panel:#171622; --panel-2:#1c1b28; --raise:#26243480;
    --line:#2c2b3a; --line-2:#3c3a54; --text:#eceaf3; --muted:#827e93;
    --amber:#f2a64a; --amber-deep:#e0892c; --rec:#ff5240;
    --wave-idle:#54526a; --wave-hot:#f2a64a;
    --display:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
    --ui:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--ink);color:var(--text);
    font-family:var(--ui);overscroll-behavior:none;-webkit-font-smoothing:antialiased;}
  body{padding:0 0 192px;max-width:600px;margin:0 auto;min-height:100vh;
    background-image:
      radial-gradient(130% 55% at 50% -8%, #211e30 0%, transparent 60%),
      radial-gradient(100% 50% at 50% 108%, #1a1726 0%, transparent 55%);
    background-color:var(--ink);}

  .top{position:sticky;top:0;z-index:10;padding:18px 18px 12px;
    background:linear-gradient(to bottom, var(--ink) 70%, transparent);}
  .brandrow{display:flex;align-items:center;justify-content:space-between;}
  .brand{display:flex;align-items:baseline;gap:10px;}
  .wordmark{font-family:var(--display);font-weight:700;font-size:25px;letter-spacing:3.5px;margin:0;line-height:1;}
  .brand{min-width:0;flex:1;}
  .logo-svg{height:40px;width:auto;max-width:78vw;display:block;}
  .tagline{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);}
  .led{width:9px;height:9px;border-radius:50%;background:#2c2a38;box-shadow:inset 0 0 0 1px #00000060;transition:background .2s,box-shadow .2s;}
  .led.rec{background:var(--rec);box-shadow:0 0 11px var(--rec);animation:blink 1s steps(2,jump-none) infinite;}
  .led.playing{background:var(--amber);box-shadow:0 0 11px var(--amber);}
  @keyframes blink{50%{opacity:.35;}}
  .readout{font-family:var(--mono);font-size:11px;letter-spacing:.5px;color:var(--muted);margin-top:9px;display:flex;gap:7px;align-items:center;}
  .readout b{color:var(--text);font-weight:500;}
  .readout .sep{color:var(--line-2);}
  .readout .grow{flex:1;}
  .exportbtn{font-family:var(--ui);font-size:11.5px;font-weight:600;color:var(--amber);
    background:#f2a64a14;border:1px solid #f2a64a44;border-radius:9px;padding:6px 11px;cursor:pointer;
    letter-spacing:.2px;transition:background .12s;}
  .exportbtn:active{background:#f2a64a26;}
  .exportbtn[hidden]{display:none;}

  .clips{display:flex;flex-direction:column;gap:12px;padding:8px 14px 0;}

  .empty{min-height:46vh;border-radius:22px;padding:26px 24px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    background:radial-gradient(125% 90% at 50% 26%, #1b1929 0%, #0f0e15 100%);
    box-shadow:inset 0 2px 22px #000000b0, inset 0 0 0 1px #ffffff08, 0 10px 30px #00000050;}
  .empty canvas{width:100%;max-width:440px;height:96px;display:block;margin-bottom:22px;}
  .empty h2{font-family:var(--display);font-weight:600;font-size:17px;margin:0 0 9px;}
  .empty p{margin:0;color:var(--muted);font-size:13.5px;line-height:1.65;max-width:300px;}
  .empty .cue{margin-top:20px;display:flex;gap:18px;font-family:var(--mono);font-size:10.5px;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);}
  .empty .cue i{color:var(--amber);font-style:normal;margin-right:5px;}
  .empty .micnote{margin-top:15px;font-size:11.5px;color:var(--muted);opacity:.85;}
  .empty .micnote b{color:var(--text);font-weight:500;}

  .clip{position:relative;border-radius:17px;padding:12px 13px 13px;display:flex;flex-direction:column;gap:9px;
    background:linear-gradient(180deg,#1b1a27 0%, #15141f 100%);border:1px solid var(--line);
    box-shadow:inset 0 1px 0 #ffffff0d, 0 4px 16px #00000055;
    transition:border-color .15s,box-shadow .15s,opacity .15s,transform .12s;animation:rise .26s cubic-bezier(.2,.7,.3,1);}
  @keyframes rise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
  .clip.muted{opacity:.4;}
  .clip.now{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber),0 8px 26px #00000060, inset 0 1px 0 #ffffff10;}
  .clip.dragging{border-color:var(--line-2);box-shadow:0 16px 38px #000000bb;transform:scale(1.015);z-index:5;}

  .cliphead{display:flex;align-items:center;gap:9px;}
  .handle{flex:0 0 auto;width:24px;height:30px;display:flex;align-items:center;justify-content:center;color:var(--muted);cursor:grab;touch-action:none;font-size:15px;line-height:0;}
  .handle::before{content:"\22EE\22EE";letter-spacing:-3px;}
  .handle:active{cursor:grabbing;color:var(--text);}
  .label{flex:1 1 auto;min-width:0;background:transparent;border:none;color:var(--text);font-family:var(--ui);font-size:15.5px;font-weight:500;padding:3px 0;outline:none;}
  .label::placeholder{color:var(--muted);font-weight:400;font-style:italic;}
  .dur{flex:0 0 auto;font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.5px;font-variant-numeric:tabular-nums;background:#00000040;padding:3px 7px;border-radius:6px;}

  .wave{width:100%;height:50px;display:block;border-radius:9px;cursor:pointer;background:linear-gradient(180deg,#00000030,#00000010);box-shadow:inset 0 1px 4px #00000060;}

  .metaline{display:flex;align-items:center;gap:8px;}
  .chip{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);
    background:#00000035;border:1px solid var(--line);border-radius:6px;padding:4px 8px;cursor:pointer;
    transition:color .12s,border-color .12s,background .12s;display:inline-flex;gap:6px;align-items:center;}
  .chip b{color:var(--text);font-weight:500;}
  .chip.on{color:var(--amber);border-color:#f2a64a44;background:#f2a64a12;}
  .chip.on b{color:var(--amber);}
  .chip:active{background:var(--raise);}
  .metaline .grow{flex:1;}

  .cliprow{display:flex;align-items:center;gap:7px;}
  .cliprow .grow{flex:1;}
  .icon{height:34px;min-width:38px;padding:0 11px;border-radius:9px;border:1px solid var(--line);
    background:#00000028;color:var(--text);font-size:13px;font-family:var(--ui);display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:background .12s,border-color .12s,color .12s;}
  .icon:active{background:var(--raise);}
  .icon .gl{font-size:11px;}
  .icon.inc.on{color:var(--amber);border-color:#f2a64a55;background:#f2a64a14;}
  .icon.inc.off{color:var(--muted);}
  .icon.del{color:var(--muted);min-width:40px;padding:0;}
  .icon.del:active{color:var(--rec);border-color:#ff524055;}

  .dock{position:fixed;left:0;right:0;bottom:0;z-index:15;background:linear-gradient(to top,var(--ink) 60%, #0d0c11e6 86%, transparent);padding:16px 16px calc(16px + env(safe-area-inset-bottom));}
  .dockinner{max-width:600px;margin:0 auto;border:1px solid var(--line);border-radius:21px;padding:14px 14px 15px;background:linear-gradient(180deg,#1f1d2c 0%, #16151f 100%);box-shadow:0 14px 44px #000000bb, inset 0 1px 0 #ffffff10;}
  .fader{display:flex;align-items:center;gap:11px;margin-bottom:13px;}
  .fader .pole{font-family:var(--mono);font-size:9.5px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);flex:0 0 auto;width:34px;}
  .fader .pole.r{text-align:right;}
  .trackwrap{flex:1;position:relative;height:24px;display:flex;align-items:center;}
  .ticks{position:absolute;left:0;right:0;top:50%;height:8px;transform:translateY(-50%);background:repeating-linear-gradient(90deg,var(--line-2) 0 1px,transparent 1px 11px);opacity:.5;pointer-events:none;}
  .detent{position:absolute;left:50%;top:50%;width:2px;height:13px;transform:translate(-50%,-50%);background:var(--line-2);pointer-events:none;}
  input[type=range]{position:relative;width:100%;-webkit-appearance:none;appearance:none;background:transparent;outline:none;margin:0;}
  input[type=range]::-webkit-slider-runnable-track{height:3px;border-radius:3px;background:var(--line);}
  input[type=range]::-moz-range-track{height:3px;border-radius:3px;background:var(--line);}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;margin-top:-10.5px;border-radius:7px;background:linear-gradient(180deg,#403d58,#23222f);border:1px solid var(--line-2);box-shadow:0 3px 7px #000000b0, inset 0 1px 0 #ffffff1c;}
  input[type=range]::-moz-range-thumb{width:24px;height:24px;border-radius:7px;background:linear-gradient(180deg,#403d58,#23222f);border:1px solid var(--line-2);box-shadow:0 3px 7px #000000b0;}
  .breatheVal{font-family:var(--mono);font-size:11px;color:var(--text);text-align:center;margin:-4px 0 13px;letter-spacing:.5px;}
  .breatheVal span{color:var(--muted);}
  .transport{display:flex;gap:9px;align-items:stretch;}
  .tbtn{border:1px solid var(--line);border-radius:13px;font-family:var(--ui);font-weight:600;font-size:14px;display:flex;align-items:center;justify-content:center;gap:7px;cursor:pointer;color:var(--text);height:52px;transition:transform .08s,filter .12s,background .12s;background:linear-gradient(180deg,#2a2838,#1a1925);box-shadow:inset 0 1px 0 #ffffff12, 0 2px 6px #00000050;}
  .tbtn:active{transform:translateY(1px);filter:brightness(1.15);}
  .tbtn .dot{width:10px;height:10px;border-radius:50%;background:var(--rec);box-shadow:0 0 8px var(--rec);}
  .tbtn.rec{flex:0 0 auto;padding:0 16px;}
  .tbtn.rec.recording{background:linear-gradient(180deg,#ff5240,#cc3424);border-color:#ff5240;color:#fff;}
  .tbtn.rec.recording .dot{background:#fff;box-shadow:0 0 8px #fff;animation:blink 1s steps(2,jump-none) infinite;}
  .tbtn.load{flex:0 0 auto;width:50px;font-size:18px;color:var(--muted);}
  .tbtn.play{flex:1;background:linear-gradient(180deg,#f6ad52,#dd861f);color:#1a1206;border-color:#f2a64a;font-size:15px;box-shadow:0 4px 16px #f2a64a38,inset 0 1px 0 #ffffff50;}
  .tbtn.loop{flex:0 0 auto;width:50px;font-size:18px;color:var(--muted);}
  .tbtn.loop.on{color:var(--amber);border-color:#f2a64a55;background:linear-gradient(180deg,#2c2535,#1e1a26);}

  .file-in{display:none;}
  .toast{position:fixed;left:50%;bottom:204px;transform:translateX(-50%) translateY(8px);background:var(--panel-2);border:1px solid var(--line-2);color:var(--text);padding:10px 16px;border-radius:11px;font-size:13px;font-family:var(--ui);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:30;box-shadow:0 8px 24px #000000aa;max-width:80%;text-align:center;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @media (prefers-reduced-motion: reduce){
    .clip{animation:none;} .led.rec,.tbtn.rec.recording .dot{animation:none;}
  }
</style>
</head>

<script>
"use strict";

let clips = [];
let settings = { breathe:0, loop:false, seenHint:false };
const bufferCache = new Map();
let ctx = null;
let play = { on:false, sched:[], t0:0, total:0, raf:0, srcs:[] };
let preview = { id:null, t0:0, dur:0, raf:0, src:null };
let idleRaf = 0, unlocked=false;
const reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// ---------- indexeddb ----------
let db = null;
function openDB(){return new Promise((res,rej)=>{
  const r=indexedDB.open("sketch-db",3);
  r.onupgradeneeded=e=>{const d=e.target.result;
    if(!d.objectStoreNames.contains("clips"))d.createObjectStore("clips",{keyPath:"id"});
    if(!d.objectStoreNames.contains("meta"))d.createObjectStore("meta",{keyPath:"k"});};
  r.onsuccess=e=>{db=e.target.result;res();};
  r.onerror=()=>rej(r.error);});}
function store(s,m){return db.transaction(s,m).objectStore(s);}
function putClip(c){try{store("clips","readwrite").put({id:c.id,name:c.name,blob:c.blob,dur:c.dur,included:c.included,order:c.order,peaks:c.peaks,gain:c.gain,source:c.source,enhance:c.enhance});}catch(e){}}
function delClipDB(id){try{store("clips","readwrite").delete(id);}catch(e){}}
function saveMeta(){try{store("meta","readwrite").put({k:"settings",v:settings});}catch(e){}}
function loadAll(){return new Promise(res=>{const out=[];const s=store("clips","readonly").openCursor();
  s.onsuccess=e=>{const c=e.target.result;if(c){out.push(c.value);c.continue();}else{clips=out.sort((a,b)=>a.order-b.order);res();}};
  s.onerror=()=>res();});}
function loadMeta(){return new Promise(res=>{const r=store("meta","readonly").get("settings");
  r.onsuccess=()=>{if(r.result&&r.result.v)settings=Object.assign(settings,r.result.v);res();};
  r.onerror=()=>res();});}

// ---------- audio core ----------
function ensureCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
function unlockAudio(){if(unlocked)return;unlocked=true;try{ensureCtx();if(ctx.state==="suspended")ctx.resume();}catch(e){}}
document.addEventListener("pointerdown",unlockAudio,{once:true});

async function decode(blob){ensureCtx();const a=await blob.arrayBuffer();return ctx.decodeAudioData(a.slice(0));}
async function getBuffer(c){if(bufferCache.has(c.id))return bufferCache.get(c.id);
  const a=await c.blob.arrayBuffer();const b=await ctx.decodeAudioData(a);bufferCache.set(c.id,b);return b;}
function fmt(s){if(!isFinite(s)||s<0)return"--";const m=Math.floor(s/60),ss=Math.round(s%60);return m+":"+String(ss).padStart(2,"0");}

function computePeaks(buf,buckets){
  const ch=buf.getChannelData(0);const block=Math.floor(ch.length/buckets)||1;const out=new Array(buckets);
  for(let i=0;i<buckets;i++){let max=0;const start=i*block;
    for(let j=0;j<block;j++){const v=Math.abs(ch[start+j]||0);if(v>max)max=v;}out[i]=max;}
  const peak=Math.max.apply(null,out.concat(0.0001));return out.map(v=>v/peak);
}
function analyzeGain(buf){
  const ch=buf.getChannelData(0);const step=Math.max(1,Math.floor(ch.length/40000));
  let sum=0,count=0;for(let i=0;i<ch.length;i+=step){const v=ch[i];sum+=v*v;count++;}
  const rms=Math.sqrt(sum/(count||1));const target=0.10;
  if(rms<0.0002)return 1;return Math.min(target/rms,6);
}

// processed source chain on a given context
function buildChain(actx,c,buf){
  const src=actx.createBufferSource();src.buffer=buf;let node=src;
  if(c.enhance){
    const hp=actx.createBiquadFilter();hp.type="highpass";hp.frequency.value=80;hp.Q.value=0.7;node.connect(hp);node=hp;
    const comp=actx.createDynamicsCompressor();
    comp.threshold.value=-26;comp.knee.value=22;comp.ratio.value=3;comp.attack.value=0.004;comp.release.value=0.25;node.connect(comp);node=comp;
    const pres=actx.createBiquadFilter();pres.type="highshelf";pres.frequency.value=3600;pres.gain.value=2.5;node.connect(pres);node=pres;
  }
  const ng=actx.createGain();ng.gain.value=c.gain||1;node.connect(ng);node=ng;
  const fade=actx.createGain();node.connect(fade);
  return {src,out:fade,fade};
}

// ---------- waveform ----------
function drawWave(canvas,peaks,progress){
  if(!canvas||!peaks)return;
  const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth||300,h=canvas.clientHeight||50;
  if(canvas.width!==Math.round(w*dpr)||canvas.height!==Math.round(h*dpr)){canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);}
  const g=canvas.getContext("2d");g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,w,h);
  const n=peaks.length,bw=w/n,barW=Math.max(1.1,bw*0.6),mid=h/2;
  const idle=getCSS("--wave-idle"),hot=getCSS("--wave-hot");
  for(let i=0;i<n;i++){const x=i*bw+(bw-barW)/2;const amp=Math.max(1.5,peaks[i]*(h*0.46));
    g.fillStyle=(i/n)<=progress?hot:idle;g.fillRect(x,mid-amp,barW,amp*2);}
}
let _css={};
function getCSS(v){if(_css[v])return _css[v];const c=getComputedStyle(document.documentElement).getPropertyValue(v).trim();_css[v]=c;return c;}
function drawIdle(canvas,t){
  const dpr=window.devicePixelRatio||1;const w=canvas.clientWidth||340,h=canvas.clientHeight||96;
  if(canvas.width!==Math.round(w*dpr)||canvas.height!==Math.round(h*dpr)){canvas.width=Math.round(w*dpr);canvas.height=Math.round(h*dpr);}
  const g=canvas.getContext("2d");g.setTransform(dpr,0,0,dpr,0,0);g.clearRect(0,0,w,h);
  const n=64,bw=w/n,barW=Math.max(1.4,bw*0.5),mid=h/2;
  for(let i=0;i<n;i++){
    const env=Math.sin((i/n)*Math.PI);
    const wob=0.4+0.6*Math.abs(Math.sin(i*0.45+t)*Math.cos(i*0.13-t*0.7));
    const amp=Math.max(1.2,env*wob*(h*0.32));const x=i*bw+(bw-barW)/2;
    const lit=Math.abs(i-(n/2+Math.sin(t)*n*0.35))<3;
    g.fillStyle=lit?"#f2a64a":"#3a3850";g.fillRect(x,mid-amp,barW,amp*2);
  }
}

// ---------- render ----------
const clipsEl=document.getElementById("clips");
function stopIdle(){if(idleRaf){cancelAnimationFrame(idleRaf);idleRaf=0;}}
function render(){
  stopIdle();clipsEl.innerHTML="";
  if(!clips.length){
    const d=document.createElement("div");d.className="empty";
    const cv=document.createElement("canvas");
    const h2=document.createElement("h2");h2.textContent="Ready when you are";
    const p=document.createElement("p");p.textContent="Record a fragment, or load a clean bounce off the Zoom. Each take shows up as a waveform you can drag, label, and hear in any order.";
    const cue=document.createElement("div");cue.className="cue";
    cue.innerHTML='<span><i>&#9679;</i>Record</span><span><i>&#10515;</i>Load</span>';
    const note=document.createElement("div");note.className="micnote";
    note.innerHTML='First time? Tap <b>Record</b> and allow the microphone when asked.';
    d.appendChild(cv);d.appendChild(h2);d.appendChild(p);d.appendChild(cue);d.appendChild(note);
    clipsEl.appendChild(d);
    let t=0;const frame=()=>{drawIdle(cv,t);if(!reduceMotion){t+=0.025;idleRaf=requestAnimationFrame(frame);}};
    requestAnimationFrame(frame);updateReadout();return;
  }
  clips.forEach(c=>{
    const row=document.createElement("div");row.className="clip"+(c.included?"":" muted");row.dataset.id=c.id;
    const head=document.createElement("div");head.className="cliphead";
    const h=document.createElement("div");h.className="handle";h.addEventListener("pointerdown",e=>startDrag(e,c.id));
    const inp=document.createElement("input");inp.className="label";inp.value=c.name||"";inp.placeholder="untitled take";
    inp.addEventListener("input",()=>{c.name=inp.value;putClip(c);});
    const dur=document.createElement("span");dur.className="dur";dur.textContent=fmt(c.dur);
    head.appendChild(h);head.appendChild(inp);head.appendChild(dur);

    const cv=document.createElement("canvas");cv.className="wave";cv.addEventListener("click",()=>previewClip(c));c._canvas=cv;

    const meta=document.createElement("div");meta.className="metaline";
    const isMic=c.source==="mic";
    const chip=document.createElement("button");chip.className="chip"+(c.enhance?" on":"");
    function chipText(){chip.innerHTML='<b>'+(isMic?"MIC":"LINE")+'</b> '+(c.enhance?"cleaned up":"leveled");}
    chipText();chip.title="Tap to toggle cleanup";
    chip.addEventListener("click",()=>{c.enhance=!c.enhance;putClip(c);chip.classList.toggle("on",c.enhance);chipText();toast(c.enhance?"Cleanup on":"Cleanup off");});
    const mg=document.createElement("div");mg.className="grow";
    const exp=document.createElement("button");exp.className="chip";exp.innerHTML="&#10515; WAV";exp.title="Export this take as WAV";
    exp.addEventListener("click",()=>exportTake(c));
    meta.appendChild(chip);meta.appendChild(mg);meta.appendChild(exp);

    const rowb=document.createElement("div");rowb.className="cliprow";
    const solo=document.createElement("button");solo.className="icon";solo.innerHTML='<span class="gl">&#9654;</span> Listen';
    solo.addEventListener("click",()=>previewClip(c));
    const inc=document.createElement("button");inc.className="icon inc "+(c.included?"on":"off");
    inc.innerHTML=c.included?'<span class="gl">&#9679;</span> In song':'<span class="gl">&#9675;</span> Muted';
    inc.addEventListener("click",()=>{c.included=!c.included;putClip(c);render();});
    const grow=document.createElement("div");grow.className="grow";
    const del=document.createElement("button");del.className="icon del";del.innerHTML="&#10005;";
    del.addEventListener("click",()=>{if(confirm("Delete this take?"))removeClip(c.id);});
    rowb.appendChild(solo);rowb.appendChild(inc);rowb.appendChild(grow);rowb.appendChild(del);

    row.appendChild(head);row.appendChild(cv);row.appendChild(meta);row.appendChild(rowb);
    clipsEl.appendChild(row);
  });
  requestAnimationFrame(()=>{clips.forEach(c=>{if(c.peaks)drawWave(c._canvas,c.peaks,0);});});
  ensureAnalysis();updateReadout();
}
async function ensureAnalysis(){
  for(const c of clips){let changed=false;
    if(!c.peaks||!c.peaks.length||c.gain==null){
      try{const buf=await getBuffer(c);
        if(!c.peaks||!c.peaks.length){c.peaks=computePeaks(buf,200);changed=true;}
        if(c.gain==null){c.gain=analyzeGain(buf);changed=true;}}catch(e){}}
    if(c.source==null){c.source="file";changed=true;}
    if(c.enhance==null){c.enhance=(c.source==="mic");changed=true;}
    if(changed){putClip(c);if(c._canvas&&c.peaks)drawWave(c._canvas,c.peaks,0);}}
}
function updateReadout(){
  const inc=clips.filter(c=>c.included);
  document.getElementById("rCount").textContent=clips.length;
  document.getElementById("rTime").textContent=fmt(inc.reduce((s,c)=>s+(c.dur||0),0));
  document.getElementById("exportBtn").hidden=clips.length===0;
}

// ---------- drag ----------
let drag=null;
function startDrag(e,id){
  e.preventDefault();stopPlayback();stopPreview();
  const row=clipsEl.querySelector('.clip[data-id="'+id+'"]');if(!row)return;
  row.classList.add("dragging");try{row.setPointerCapture(e.pointerId);}catch(x){}
  drag={id,row};document.addEventListener("pointermove",onDrag);document.addEventListener("pointerup",endDrag);
}
function onDrag(e){
  if(!drag)return;const y=e.clientY;const rows=[...clipsEl.querySelectorAll(".clip")];
  for(const other of rows){if(other===drag.row)continue;
    const r=other.getBoundingClientRect();const mid=r.top+r.height/2;const dr=drag.row.getBoundingClientRect();
    if(y<mid&&dr.top>r.top){clipsEl.insertBefore(drag.row,other);break;}
    if(y>mid&&dr.top<r.top){clipsEl.insertBefore(drag.row,other.nextSibling);break;}}
}
function endDrag(){
  if(!drag)return;drag.row.classList.remove("dragging");
  document.removeEventListener("pointermove",onDrag);document.removeEventListener("pointerup",endDrag);
  const order=[...clipsEl.querySelectorAll(".clip")].map(r=>r.dataset.id);
  clips.sort((a,b)=>order.indexOf(a.id)-order.indexOf(b.id));
  clips.forEach((c,i)=>{c.order=i;putClip(c);});drag=null;
}

// ---------- preview ----------
async function previewClip(c){
  ensureCtx();await ctx.resume();stopPlayback();stopPreview();
  const buf=await getBuffer(c);const ch=buildChain(ctx,c,buf);ch.out.connect(ctx.destination);ch.src.start();
  preview={id:c.id,t0:ctx.currentTime,dur:buf.duration,raf:0,src:ch.src};
  ch.src.onended=()=>{if(preview.id===c.id)stopPreview();};
  setLed("playing");previewTick();
}
function previewTick(){
  if(!preview.id)return;const c=clips.find(x=>x.id===preview.id);
  const p=Math.min(1,(ctx.currentTime-preview.t0)/preview.dur);
  if(c&&c._canvas&&c.peaks)drawWave(c._canvas,c.peaks,p);
  if(p>=1){stopPreview();return;}preview.raf=requestAnimationFrame(previewTick);
}
function stopPreview(){
  if(preview.raf)cancelAnimationFrame(preview.raf);
  if(preview.src){try{preview.src.stop();}catch(e){}}
  const c=clips.find(x=>x.id===preview.id);if(c&&c._canvas&&c.peaks)drawWave(c._canvas,c.peaks,0);
  preview={id:null,t0:0,dur:0,raf:0,src:null};if(!play.on)setLed("");
}

// ---------- arrangement playback ----------
async function startPlay(){
  ensureCtx();await ctx.resume();stopPlayback();stopPreview();
  const inc=clips.filter(c=>c.included);
  if(!inc.length){toast("All takes muted — nothing to play");return;}
  let bufs;try{bufs=await Promise.all(inc.map(getBuffer));}catch(e){toast("Couldn't read a take");return;}
  const b=settings.breathe/1000;const gap=b>0?b:0,wantOv=b<0?-b:0;
  const t0=ctx.currentTime+0.12;let cursor=0;const sched=[];play.srcs=[];
  for(let i=0;i<inc.length;i++){
    const buf=bufs[i],dur=buf.duration,start=cursor;sched.push({c:inc[i],start,dur});
    const ch=buildChain(ctx,inc[i],buf);ch.out.connect(ctx.destination);
    const ov=wantOv>0?Math.min(wantOv,dur*0.5):0;const fade=ch.fade;
    if(i>0&&ov>0){fade.gain.setValueAtTime(0,t0+start);fade.gain.linearRampToValueAtTime(1,t0+start+ov);}
    else fade.gain.setValueAtTime(1,t0+start);
    if(i<inc.length-1&&ov>0){fade.gain.setValueAtTime(1,t0+start+dur-ov);fade.gain.linearRampToValueAtTime(0,t0+start+dur);}
    ch.src.start(t0+start);play.srcs.push(ch.src);
    if(i<inc.length-1){const no=wantOv>0?Math.min(wantOv,dur*0.5,bufs[i+1].duration*0.5):0;cursor+=dur-no+gap;}else cursor+=dur;
  }
  play.on=true;play.sched=sched;play.t0=t0;play.total=cursor;setPlayBtn(true);setLed("playing");tick();
}
function tick(){
  if(!play.on)return;const el=ctx.currentTime-play.t0;
  clipsEl.querySelectorAll(".clip").forEach(r=>r.classList.remove("now"));
  for(const s of play.sched){const c=s.c;
    if(el>=s.start&&el<s.start+s.dur){const row=clipsEl.querySelector('.clip[data-id="'+c.id+'"]');if(row)row.classList.add("now");
      if(c._canvas&&c.peaks)drawWave(c._canvas,c.peaks,(el-s.start)/s.dur);}
    else if(el>=s.start+s.dur){if(c._canvas&&c.peaks)drawWave(c._canvas,c.peaks,1);}}
  if(el>=play.total){if(settings.loop){startPlay();return;}stopPlayback();return;}
  play.raf=requestAnimationFrame(tick);
}
function stopPlayback(){
  play.on=false;if(play.raf)cancelAnimationFrame(play.raf);
  play.srcs.forEach(s=>{try{s.stop();}catch(e){}});play.srcs=[];setPlayBtn(false);
  clipsEl.querySelectorAll(".clip").forEach(r=>r.classList.remove("now"));
  clips.forEach(c=>{if(c._canvas&&c.peaks)drawWave(c._canvas,c.peaks,0);});if(!preview.id)setLed("");
}
function setPlayBtn(p){document.getElementById("playBtn").innerHTML=p?"&#9632; Stop":"&#9654; Play";}
function setLed(state){document.getElementById("led").className="led"+(state?" "+state:"");}

// ---------- recording ----------
let rec=null,recChunks=[],recStream=null;
function pickMime(){
  const cands=["audio/webm;codecs=opus","audio/webm","audio/mp4","audio/aac","audio/ogg;codecs=opus"];
  if(window.MediaRecorder&&MediaRecorder.isTypeSupported){for(const m of cands)if(MediaRecorder.isTypeSupported(m))return m;}
  return "";
}
async function toggleRec(){
  const b=document.getElementById("recBtn");
  if(rec&&rec.state==="recording"){rec.stop();return;}
  let stream;
  try{stream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});}
  catch(e){try{stream=await navigator.mediaDevices.getUserMedia({audio:true});}catch(e2){toast("Mic blocked — allow microphone access");return;}}
  recStream=stream;recChunks=[];const mime=pickMime();
  try{rec=mime?new MediaRecorder(stream,{mimeType:mime}):new MediaRecorder(stream);}catch(e){rec=new MediaRecorder(stream);}
  rec.ondataavailable=e=>{if(e.data&&e.data.size)recChunks.push(e.data);};
  rec.onstop=async()=>{
    b.classList.remove("recording");b.innerHTML='<span class="dot"></span>Record';setLed("");
    recStream.getTracks().forEach(t=>t.stop());
    const type=rec.mimeType||mime||"audio/webm";const blob=new Blob(recChunks,{type});
    await addClip(blob,"","mic");
  };
  rec.start();b.classList.add("recording");b.innerHTML='<span class="dot"></span>Stop';setLed("rec");stopPlayback();stopPreview();
}

// ---------- add / remove ----------
async function addClip(blob,name,source){
  let dur=0,peaks=null,gain=1;
  try{const buf=await decode(blob);dur=buf.duration;peaks=computePeaks(buf,200);gain=analyzeGain(buf);}catch(e){}
  const src=source||"file";
  const c={id:"c"+Date.now()+Math.floor(Math.random()*999),name:name||"",blob,dur,included:true,order:clips.length,peaks,gain,source:src,enhance:(src==="mic")};
  clips.push(c);putClip(c);render();
  if(!name)toast(src==="mic"?"Take recorded · auto-leveled":"Take added");
}
function removeClip(id){
  bufferCache.delete(id);clips=clips.filter(c=>c.id!==id);
  clips.forEach((c,i)=>{c.order=i;putClip(c);});delClipDB(id);render();
}

// ---------- file load ----------
document.getElementById("fileIn").addEventListener("change",async e=>{
  const files=[...e.target.files];
  for(const f of files)await addClip(f,f.name.replace(/\.[^.]+$/,""),"file");
  if(files.length)toast(files.length+" loaded · auto-leveled");e.target.value="";
});

// ---------- WAV export ----------
function audioBufferToWav(buf){
  const numCh=buf.numberOfChannels,sr=buf.sampleRate,len=buf.length;
  const blockAlign=numCh*2,dataLen=len*blockAlign,total=44+dataLen;
  const ab=new ArrayBuffer(total),view=new DataView(ab);let p=0;
  const ws=s=>{for(let i=0;i<s.length;i++)view.setUint8(p++,s.charCodeAt(i));};
  const u32=v=>{view.setUint32(p,v,true);p+=4;};const u16=v=>{view.setUint16(p,v,true);p+=2;};
  ws("RIFF");u32(36+dataLen);ws("WAVE");ws("fmt ");u32(16);u16(1);u16(numCh);u32(sr);u32(sr*blockAlign);u16(blockAlign);u16(16);ws("data");u32(dataLen);
  const chans=[];for(let c=0;c<numCh;c++)chans.push(buf.getChannelData(c));
  for(let i=0;i<len;i++)for(let c=0;c<numCh;c++){let s=Math.max(-1,Math.min(1,chans[c][i]));view.setInt16(p,s<0?s*0x8000:s*0x7fff,true);p+=2;}
  return new Blob([ab],{type:"audio/wav"});
}
function downloadBlob(blob,name){
  const url=URL.createObjectURL(blob);const a=document.createElement("a");
  a.href=url;a.download=name;document.body.appendChild(a);a.click();
  setTimeout(()=>{URL.revokeObjectURL(url);a.remove();},2000);
}
function safeName(s){return (s||"sketch").replace(/[^a-z0-9_\- ]/gi,"").trim().replace(/\s+/g,"-")||"sketch";}

async function renderArrangement(){
  const inc=clips.filter(c=>c.included);if(!inc.length)return null;
  const bufs=await Promise.all(inc.map(getBuffer));
  const b=settings.breathe/1000;const gap=b>0?b:0,wantOv=b<0?-b:0;
  let cursor=0;const starts=[];
  for(let i=0;i<inc.length;i++){const dur=bufs[i].duration;starts.push(cursor);
    if(i<inc.length-1){const no=wantOv>0?Math.min(wantOv,dur*0.5,bufs[i+1].duration*0.5):0;cursor+=dur-no+gap;}else cursor+=dur;}
  const total=cursor,sr=bufs[0].sampleRate||44100;
  const off=new OfflineAudioContext(2,Math.max(1,Math.ceil((total+0.05)*sr)),sr);
  for(let i=0;i<inc.length;i++){
    const buf=bufs[i],dur=buf.duration,start=starts[i];
    const ch=buildChain(off,inc[i],buf);ch.out.connect(off.destination);
    const ov=wantOv>0?Math.min(wantOv,dur*0.5):0;const fade=ch.fade;
    if(i>0&&ov>0){fade.gain.setValueAtTime(0,start);fade.gain.linearRampToValueAtTime(1,start+ov);}
    else fade.gain.setValueAtTime(1,start);
    if(i<inc.length-1&&ov>0){fade.gain.setValueAtTime(1,start+dur-ov);fade.gain.linearRampToValueAtTime(0,start+dur);}
    ch.src.start(start);
  }
  return await off.startRendering();
}
async function exportArrangement(){
  const inc=clips.filter(c=>c.included);
  if(!inc.length){toast("All takes muted — nothing to export");return;}
  toast("Bouncing arrangement…");
  try{const out=await renderArrangement();if(!out){toast("Nothing to export");return;}
    downloadBlob(audioBufferToWav(out),"sketch-arrangement.wav");toast("Exported arrangement · WAV");}
  catch(e){toast("Export failed");}
}
async function exportTake(c){
  toast("Exporting take…");
  try{const buf=await getBuffer(c);const sr=buf.sampleRate||44100;
    const off=new OfflineAudioContext(buf.numberOfChannels||1,buf.length,sr);
    const ch=buildChain(off,c,buf);ch.out.connect(off.destination);ch.fade.gain.value=1;ch.src.start(0);
    const out=await off.startRendering();
    downloadBlob(audioBufferToWav(out),safeName(c.name||"take")+".wav");toast("Exported take · WAV");}
  catch(e){toast("Export failed");}
}

// ---------- breathe ----------
const breatheEl=document.getElementById("breathe"),breatheVal=document.getElementById("breatheVal");
function breatheText(ms){
  if(ms===0)return 'tight <span>— back to back</span>';
  if(ms<0)return (Math.abs(ms)/1000).toFixed(1)+'s blend <span>— takes crossfade</span>';
  return (ms/1000).toFixed(1)+'s gap <span>— room to breathe</span>';
}
breatheEl.addEventListener("input",()=>{settings.breathe=parseInt(breatheEl.value,10);breatheVal.innerHTML=breatheText(settings.breathe);saveMeta();});

// ---------- buttons ----------
document.getElementById("recBtn").addEventListener("click",toggleRec);
document.getElementById("loadBtn").addEventListener("click",()=>document.getElementById("fileIn").click());
document.getElementById("playBtn").addEventListener("click",()=>{play.on?stopPlayback():startPlay();});
document.getElementById("exportBtn").addEventListener("click",exportArrangement);
const loopBtn=document.getElementById("loopBtn");
loopBtn.addEventListener("click",()=>{settings.loop=!settings.loop;loopBtn.classList.toggle("on",settings.loop);saveMeta();});
window.addEventListener("resize",()=>{clips.forEach(c=>{if(c.peaks&&c._canvas)drawWave(c._canvas,c.peaks,0);});});

// ---------- toast ----------
let toastT=null;
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove("show"),1900);}

// ---------- boot ----------
(async function(){
  try{await openDB();await loadMeta();await loadAll();}catch(e){}
  breatheEl.value=settings.breathe;breatheVal.innerHTML=breatheText(settings.breathe);
  loopBtn.classList.toggle("on",settings.loop);render();
})();
</script>
